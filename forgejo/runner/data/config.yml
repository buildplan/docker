log:
  level: info
  job_level: info

runner:
  file: .runner
  capacity: 1
  envs:
    A_TEST_ENV_NAME_1: a_test_env_value_1
    A_TEST_ENV_NAME_2: a_test_env_value_2
  env_file: .env
  timeout: 3h
  shutdown_timeout: 3h
  insecure: false
  fetch_timeout: 5s
  fetch_interval: 2s
  report_interval: 1s
  labels: # some working images I found - choose what you need. 
    - "ubuntu-latest-gitea:docker://docker.gitea.com/runner-images:ubuntu-latest"
    - "ubuntu-24.04:docker://ghcr.io/catthehacker/ubuntu:act-24.04"
    - "ubuntu-22.04:docker://ghcr.io/catthehacker/ubuntu:act-22.04"
    - "ubuntu-full:docker://ghcr.io/catthehacker/ubuntu:full-24.04"
    - "ubuntu-latest-js:docker://ghcr.io/catthehacker/ubuntu:js-latest"
    - "debian-bookworm:docker://debian:bookworm"
    - "debian-trixie-slim:docker://debian:trixie-slim"
    - "alpine-3.20:docker://alpine:3.20"
    - "minimal-node:docker://node:24-slim"
    - "shellcheck:docker://koalaman/shellcheck-alpine:stable"

cache:
  enabled: true
  port: 8686
  dir: "/data/cache"
  secret: "long_random_string_4_runner_cache"
  host: "forgejo-runner"
  proxy_port: 0

container:
  network: forgejo_forgejo
  enable_ipv6: false
  privileged: false
  options: "--group-add 994"
  workdir_parent:
  valid_volumes: ["**"]
  docker_host: "automount"
  force_pull: false
  force_rebuild: false

host:
  workdir_parent:
